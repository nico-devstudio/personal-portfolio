<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NicoDev Studio | Front-End Web Developer</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header" id="header">
        <nav class="nav container">
            <a href="#" class="nav__logo">Nico</a>

            <div class="nav__menu" id="nav-menu">
                <ul class="nav__list">
                    <li>
                        <a href="#home" class="nav__link">Home</a>
                    </li>

                    <li>
                        <a href="#about" class="nav__link">About</a>
                    </li>

                    <li>
                        <a href="#projects" class="nav__link">Projects</a>
                    </li>

                    <li>
                        <a href="#resume" class="nav__link">Resume</a>
                    </li>

                    <li>
                        <a href="#contact" class="nav__link">Contact</a>
                    </li>
                </ul>

                <!-- Close button -->
                <div class="nav__close" id="nav-close">
                    <i class="ri-close-large-line"></i>
                </div>
            </div>

            <!-- Toggle menu -->
            <div class="nav__toggle" id="nav-toggle">
                <i class="ri-menu-line"></i>
            </div>
        </nav>
    </header>

    <main class="main">

        <section class="home section" id="home">
            <div class="home__container container grid">
                <div class="home__content">
                    <div class="home__image">
                        <img src="assets/Profile2.png" alt="profile-pic" class="home__img">
                    </div>
                    <div class="home__social">
                        <a href="https://www.linkedin.com/in/nico-garilva-dev/" target="_blank" class="home__link">
                            <i class="ri-linkedin-fill"></i>
                        </a>

                        <a href="https://github.com/nico-devstudio" target="_blank" class="home__link">
                            <i class="ri-github-fill"></i>
                        </a>

                        <a href="https://www.upwork.com/freelancers/~01bf8942fde01bbc0d?mp_source=share" target="_blank"
                            class="home__link">
                            <i class="ri-upwork-fill"></i>
                        </a>
                    </div>
                </div>
                <div class="home__data grid">
                    <p class="home__subtitle">
                        Hi, I'm a <span id="home-typed">Web Developer</span>
                    </p>

                    <h1 class="home__title">Nico Angelo Garilva</h1>

                    <p class="home__description">
                        I'm a web developer focused on building clean, responsive, and user-friendly websites. I enjoy
                        turning ideas into real, functional web experiences.
                    </p>

                    <div class="home__buttons">
                        <a href="assets/Nico-Angelo-Garilva.pdf" download="" target="_blank" class="button">Download
                            CV</a>
                        <a href="#projects" class="button button__ghost">Projects</a>
                    </div>
                </div>
            </div>
        </section>

        <section class="about section" id="about">

        </section>

        <section class="projects section" id="projects">

        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
